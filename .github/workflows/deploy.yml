name: Deploy to Production

on:
  push:
    branches: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Build backend
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o opc-aicom-backend ./cmd/server/main.go

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_MATRIX_HOMESERVER: http://8.217.143.228:8008

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 8.217.143.228 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy backend
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes root@8.217.143.228"
          $SSH "systemctl stop opc-aicom-backend || true"
          cat backend/opc-aicom-backend | $SSH "cat > /opt/opc-aicom/backend/opc-aicom-backend"
          $SSH "
            chmod +x /opt/opc-aicom/backend/opc-aicom-backend
            cp /opt/opc-aicom/backend/config/config.yaml /opt/opc-aicom/backend/config.yaml
            systemctl start opc-aicom-backend
            sleep 3
            systemctl is-active opc-aicom-backend
          "

      - name: Deploy frontend
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes root@8.217.143.228"
          $SSH "rm -rf /opt/opc-aicom/frontend/dist"
          tar czf - -C frontend dist | $SSH "tar xzf - -C /opt/opc-aicom/frontend"
          $SSH "nginx -s reload"

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes root@8.217.143.228 \
            "curl -sf -X POST http://127.0.0.1:18081/api/home/stats"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
