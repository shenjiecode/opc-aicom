    api_key: ""       # Set via ANTHROPIC_API_KEY env var
    base_url: ""

# Workspace storage configuration
workspace:
  type: local           # "local" or "oss"
  local_dir: uploads/workspace
  oss:
    endpoint: ""           # e.g. "oss-cn-hangzhou.aliyuncs.com"
    access_key_id: ""
    access_key_secret: ""
    bucket_name: ""
    region: ""
    prefix: "openc-aicom/workspace/"

# Qoder AI configuration
qoder:
  base_url: https://api.qoder.ai
  api_key: ${QODER_API_KEY}
  monthly_plan_id: ${QODER_MONTHLY_PLAN_ID}

# Alibaba Cloud configuration
alibaba_cloud:
  access_key_id: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
  access_key_secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
  region: cn-hangzhou
