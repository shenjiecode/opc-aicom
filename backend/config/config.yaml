server:
  port: 8080
  mode: debug

database:
  host: localhost
  port: 3306
  user: root
  password: rootpassword
  name: opc_aicom
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

jwt:
  secret: your-secret-key-change-in-production
  expire_hours: 24
  cookie:
    name: auth_token
    path: /
    domain: localhost
    secure: false      # 生产环境改为 true (HTTPS)
    max_age: 86400     # 24小时，单位秒

matrix:
  homeserver_url: http://localhost:8008
  server_name: localhost
  shared_secret: mysecret  # Dendrite registration_shared_secret
  admin_api_url: http://localhost:8008/_matrix/admin
  workers:
    - worker-001
    - worker-002
