version: '3.8'

services:
  dendrite:
    image: matrixdotorg/dendrite-monolith:latest
    container_name: dendrite
    restart: unless-stopped
    ports:
      - "8008:8008"
      - "8448:8448"
    volumes:
      - ./config:/etc/dendrite
      - ./data:/var/dendrite
    depends_on:
      - postgres
    environment:
      - DENDRITE_CONFIG=/etc/dendrite/dendrite.yaml

  postgres:
    image: postgres:15-alpine
    container_name: dendrite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dendrite
      POSTGRES_PASSWORD: itsasecret
      POSTGRES_DB: dendrite
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  worker-001:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker-001
    restart: unless-stopped
    environment:
      - WORKER_ID=worker-001
      - WORKER_PASSWORD=password
      - HOMESERVER_URL=http://dendrite:8008
      - COMMAND_ROOM_ALIAS=#command_center:localhost
    depends_on:
      - dendrite

  worker-002:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker-002
    restart: unless-stopped
    environment:
      - WORKER_ID=worker-002
      - WORKER_PASSWORD=password
      - HOMESERVER_URL=http://dendrite:8008
      - COMMAND_ROOM_ALIAS=#command_center:localhost
    depends_on:
      - dendrite

  commander-backend:
    build:
      context: ./commander/backend
      dockerfile: Dockerfile
    container_name: commander-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - COMMANDER_ID=commander
      - COMMANDER_PASSWORD=password
      - HOMESERVER_URL=http://dendrite:8008
      - COMMAND_ROOM_ALIAS=#command_center:localhost
    depends_on:
      - dendrite

  light-agent:
    build: ./light-agent-server
    container_name: light-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    volumes:
      - ./light-agent-config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock

  email-sender-mcp:
    build: ./mcp-skills/email-sender
    container_name: email-sender-mcp
    restart: unless-stopped
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}

  xhs-publisher-mcp:
    build: ./mcp-skills/xhs-publisher
    container_name: xhs-publisher-mcp
    restart: unless-stopped
    volumes:
      - ./xhs-cookies.json:/app/cookies.json
      - ./shared-images:/app/images
